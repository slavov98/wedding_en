<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="description" content="Radina &amp; Dilyan — we cordially invite you to our wedding celebration" />
<meta name="theme-color" content="#6E2A37" />
<meta name="format-detection" content="telephone=no" />
<meta property="og:type" content="website" />
<meta property="og:title" content="Radina &amp; Dilyan — Wedding Invitation" />
<meta property="og:description" content="We cordially invite you to our wedding celebration" />
<!-- Add og:image with an absolute URL once hosted, so link previews show a photo -->
<!-- <meta property="og:image" content="https://your-domain.com/preview.jpg" /> -->
<meta name="twitter:card" content="summary_large_image" />
<title>You Are Cordially Invited</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --paper:#FBF7EF; --panel:#FDFAF4; --ink:#221E18; --ink-soft:#5C544A;
    --hair:#D8CDBA; --hair-2:#E7DECC; --accent:#6E2A37; --accent-d:#4E1E28;
    --display:'Cormorant Garamond',Georgia,serif;
    --body:'EB Garamond',Georgia,serif;
    --util:'Jost',system-ui,sans-serif;
  }
  * { box-sizing:border-box; }
  html { -webkit-text-size-adjust:100%; }
  body {
    margin:0; min-height:100vh; min-height:100dvh;
    background:radial-gradient(120% 80% at 50% 0%, #FFFDF8 0%, var(--paper) 55%, #F4EEE1 100%);
    color:var(--ink); font-family:var(--body); font-size:18px; line-height:1.6;
    display:flex; flex-direction:column; align-items:center;
    transition:background-color .6s ease, color .6s ease;
    padding:clamp(1rem,4vw,3.5rem);
  }

  .card {
    position:relative; width:100%; max-width:660px; background:var(--panel);
    padding:clamp(2.4rem,7vw,4.25rem) clamp(1.5rem,6vw,3.5rem);
    box-shadow:0 1px 1px rgba(34,30,24,.04), 0 40px 80px -50px rgba(34,30,24,.45);
    transition:background-color .6s ease, box-shadow .6s ease;
  }
  .card::before,.card::after { content:""; position:absolute; pointer-events:none; }
  .card::before { inset:13px; border:1px solid var(--hair); }
  .card::after  { inset:18px; border:1px solid var(--hair-2); }
  .inner { position:relative; text-align:center; }

  .seal {
    width:84px; height:84px; margin:0 auto clamp(1.4rem,4vw,2rem);
    border:1px solid var(--accent); border-radius:50%;
    display:grid; place-items:center; position:relative;
  }
  .seal::after { content:""; position:absolute; inset:5px; border:1px solid var(--hair); border-radius:50%; }
  .seal span { font-family:var(--display); font-style:italic; font-size:1.85rem; color:var(--accent); line-height:1; letter-spacing:.02em; }

  .eyebrow {
    font-family:var(--util); font-weight:400; font-size:.72rem; letter-spacing:.42em;
    text-transform:uppercase; color:var(--ink-soft);
    margin:0 0 clamp(1rem,3vw,1.6rem); padding-left:.42em;
  }

  .names { font-family:var(--display); font-weight:500; line-height:.98; margin:0; letter-spacing:.005em; }
  .names .name { display:block; font-size:clamp(2.9rem,13vw,5.4rem); }
  .names .amp { display:block; font-style:italic; font-weight:500; color:var(--accent); font-size:clamp(2.4rem,9vw,3.6rem); margin:clamp(.1rem,1vw,.35rem) 0; }

  .request { font-size:1.06rem; color:var(--ink-soft); font-style:italic; margin:clamp(1.3rem,4vw,1.9rem) auto 0; max-width:32ch; }

  /* Couple photo */
  .photo-wrap { width:clamp(220px,62%,300px); margin:clamp(1.7rem,5vw,2.4rem) auto 0; }
  .photo {
    position:relative; aspect-ratio:4/5; padding:8px; background:var(--paper);
    border:1px solid var(--hair); border-radius:46% 46% 6px 6px;
    box-shadow:0 20px 44px -30px rgba(34,30,24,.5);
  }
  .photo::after { content:""; position:absolute; inset:8px; border:1px solid var(--hair-2); border-radius:44% 44% 4px 4px; pointer-events:none; }
  .photo img { width:100%; height:100%; object-fit:cover; border-radius:44% 44% 4px 4px; display:block; }
  .photo .ph { position:absolute; inset:8px; display:grid; place-items:center; align-content:center; gap:.5rem; border-radius:44% 44% 4px 4px; background:var(--panel); }
  .photo .ph .glyph { font-size:1.7rem; color:var(--accent); line-height:1; }
  .photo .ph .pht { font-family:var(--util); font-size:.6rem; letter-spacing:.28em; text-transform:uppercase; color:var(--ink-soft); padding:0 1rem; }
  .photo-cap { font-family:var(--display); font-style:italic; color:var(--ink-soft); margin:.95rem 0 0; font-size:1.06rem; }

  .rule { display:flex; align-items:center; justify-content:center; gap:.9rem; margin:clamp(1.8rem,5vw,2.8rem) auto; color:var(--accent); }
  .rule::before,.rule::after { content:""; height:1px; width:min(34%,120px); background:linear-gradient(to var(--dir,right), transparent, var(--hair)); }
  .rule::before { --dir:left; }
  .rule .mark { font-size:.6rem; transform:translateY(-1px); }

  .details { display:grid; grid-template-columns:1fr 1fr; gap:clamp(1.4rem,5vw,2.6rem); text-align:center; }
  .label { font-family:var(--util); font-weight:400; font-size:.68rem; letter-spacing:.34em; text-transform:uppercase; color:var(--accent); margin:0 0 .7rem; padding-left:.34em; }
  .d-line { margin:0; font-size:1.18rem; }
  .d-line + .d-line { margin-top:.15rem; }
  .d-sub { margin:.25rem 0 0; font-size:.98rem; color:var(--ink-soft); }

  /* Venue photo */
  .venue { margin:clamp(1.9rem,5vw,2.7rem) auto 0; }
  .venue figure { margin:0; }
  .venue .img { border:1px solid var(--hair); padding:6px; background:var(--panel); box-shadow:0 22px 46px -32px rgba(34,30,24,.5); }
  .venue img { display:block; width:100%; height:auto; }
  .venue figcaption { margin:.95rem 0 0; }
  .venue .vc-label { font-family:var(--util); font-size:.64rem; letter-spacing:.3em; text-transform:uppercase; color:var(--ink-soft); }
  .venue .vc-name { font-family:var(--display); font-size:1.32rem; margin:.25rem 0 0; }
  .venue .vc-addr { display:inline-block; margin:.5rem 0 0; font-family:var(--util); font-size:.74rem; letter-spacing:.1em; color:var(--accent); text-decoration:none; border-bottom:1px solid var(--hair); padding-bottom:1px; transition:border-color .2s ease; }
  .venue .vc-addr:hover { border-bottom-color:var(--accent); }

  .datebig { font-family:var(--display); font-weight:500; font-size:clamp(1.5rem,5.5vw,2.2rem); color:var(--ink); margin:clamp(1.5rem,4vw,2.1rem) auto 0; letter-spacing:.02em; }

  .note { font-style:italic; color:var(--ink-soft); max-width:40ch; margin:clamp(1.7rem,4vw,2.2rem) auto 0; }
  .attire { margin:1.1rem 0 0; font-size:.98rem; }
  .attire .label { display:inline; margin:0 .55rem 0 0; }

  /* Schedule */
  .schedule { margin:clamp(1.9rem,5vw,2.7rem) auto 0; text-align:center; }
  .sched-heading { font-family:var(--display); font-weight:500; font-size:clamp(1.5rem,5vw,2rem); margin:0 0 clamp(1.1rem,3vw,1.6rem); }
  .sched-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:clamp(1rem,4vw,2rem); }
  .sched-item { position:relative; }
  .sched-item + .sched-item::before { content:""; position:absolute; left:calc(-1 * clamp(.5rem,2vw,1rem)); top:15%; bottom:15%; width:1px; background:var(--hair); }
  .st-time { font-family:var(--display); font-style:italic; color:var(--accent); font-size:clamp(1.5rem,5vw,2rem); line-height:1.1; }
  .st-title { font-family:var(--util); font-size:.66rem; letter-spacing:.26em; text-transform:uppercase; color:var(--ink-soft); margin-top:.45rem; }
  .st-sub { font-family:var(--body); font-style:italic; font-size:.92rem; color:var(--ink-soft); margin-top:.35rem; line-height:1.35; }
  .st-icon { display:flex; justify-content:center; margin-bottom:.5rem; }
  .st-icon svg { width:30px; height:30px; color:var(--accent); }

  a.sched-item { text-decoration:none; color:inherit; -webkit-tap-highlight-color:transparent; transition:transform .25s ease; cursor:pointer; }
  a.sched-item:hover { transform:translateY(-2px); }
  a.sched-item:hover .st-time { text-decoration:underline; text-decoration-thickness:1px; text-underline-offset:4px; text-decoration-color:var(--hair); }
  a.sched-item:focus-visible { outline:2px solid var(--accent); outline-offset:4px; }

  /* RSVP */
  .rsvp { text-align:center; }
  .rsvp-title { font-family:var(--display); font-weight:500; font-size:clamp(1.9rem,6vw,2.6rem); margin:0; letter-spacing:.01em; }
  .rsvp-sub { color:var(--ink-soft); font-style:italic; margin:.55rem auto clamp(1.8rem,5vw,2.4rem); max-width:36ch; }

  form { text-align:left; }
  .field { margin-bottom:1.7rem; }
  .field > .flabel { display:block; font-family:var(--util); font-weight:400; font-size:.66rem; letter-spacing:.26em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:.6rem; padding-left:.26em; }
  .field .req { color:var(--accent); }

  input[type="text"],input[type="email"],select,textarea {
    width:100%; border:none; border-bottom:1px solid var(--hair); background:transparent;
    font-family:var(--body); font-size:1.08rem; color:var(--ink); padding:.6rem .1rem; transition:border-color .25s ease;
  }
  textarea { resize:vertical; min-height:3.2em; line-height:1.5; }
  select {
    appearance:none; cursor:pointer; padding-right:1.4rem;
    background-image:linear-gradient(45deg,transparent 50%,var(--ink-soft) 50%),linear-gradient(135deg,var(--ink-soft) 50%,transparent 50%);
    background-position:right .35rem center,right .15rem center; background-size:6px 6px,6px 6px; background-repeat:no-repeat;
  }
  input:focus,select:focus,textarea:focus { outline:none; border-bottom-color:var(--accent); }
  input::placeholder,textarea::placeholder { color:#B8AE9C; font-style:italic; }

  .choice { display:flex; gap:.8rem; flex-wrap:wrap; }
  .choice label {
    flex:1 1 0; min-width:150px; border:1px solid var(--hair); padding:.85rem 1rem; text-align:center;
    cursor:pointer; font-family:var(--display); font-size:1.18rem; color:var(--ink-soft); transition:all .2s ease; position:relative;
  }
  .choice input { position:absolute; opacity:0; pointer-events:none; }
  .choice label:hover { border-color:var(--accent); color:var(--ink); }
  .choice label:has(input:checked) { border-color:var(--accent); color:var(--accent); background:#FAF0EE; box-shadow:inset 0 0 0 1px var(--accent); }
  .choice label:focus-within { outline:2px solid var(--accent); outline-offset:2px; }

  .submit { display:inline-block; margin:1.4rem auto 0; border:1px solid var(--accent); background:var(--accent); color:#FBF7EF;
    font-family:var(--util); font-weight:400; font-size:.76rem; letter-spacing:.26em; text-transform:uppercase; padding:1rem 2.6rem; cursor:pointer; transition:background .22s ease,color .22s ease; }
  .submit:hover { background:var(--accent-d); border-color:var(--accent-d); }
  .submit:focus-visible { outline:2px solid var(--accent); outline-offset:3px; }
  .submit[disabled] { opacity:.55; cursor:progress; }
  .submit-wrap { text-align:center; }

  .err { color:var(--accent); font-style:italic; font-size:.92rem; text-align:center; margin:1rem 0 0; min-height:1.2em; }

  .thanks { text-align:center; }
  .thanks h2 { font-family:var(--display); font-weight:500; font-size:clamp(2rem,6vw,2.8rem); color:var(--accent); margin:0 0 .6rem; }
  .thanks p { color:var(--ink-soft); font-style:italic; margin:0 auto; max-width:32ch; }

  .footer { font-family:var(--util); font-weight:300; font-size:.68rem; letter-spacing:.34em; text-transform:uppercase; color:var(--ink-soft); margin:clamp(1.6rem,5vw,2.4rem) 0 0; text-align:center; padding-left:.34em; }

  .reveal { opacity:0; transform:translateY(14px); }
  .in .reveal { opacity:1; transform:none; transition:opacity .9s ease, transform .9s ease; }
  .in .d1 { transition-delay:.05s; } .in .d2 { transition-delay:.22s; } .in .d3 { transition-delay:.38s; }
  .in .d4 { transition-delay:.52s; } .in .d5 { transition-delay:.66s; } .in .d6 { transition-delay:.8s; }
  .in .seal { animation:sealIn 1s ease both; }
  @keyframes sealIn { from { opacity:0; transform:scale(.82); } to { opacity:1; transform:none; } }

  /* ---- Betrayal: dark takeover when someone declines ---- */
  .betrayal { margin:1.6rem auto 0; text-align:center; }
  .in .betrayal { animation:betrayIn .55s ease both; }
  .betrayal img { width:min(230px,68%); height:auto; border:1px solid var(--hair); padding:6px; background:var(--panel); box-shadow:0 26px 54px -28px rgba(0,0,0,.65); }
  .betrayal-joke { font-family:var(--display); font-style:italic; font-size:clamp(1.2rem,4.2vw,1.65rem); color:var(--accent); margin:1rem auto 0; max-width:30ch; }
  @keyframes betrayIn { from { opacity:0; transform:translateY(12px) scale(.96); } to { opacity:1; transform:none; } }

  body.betrayed {
    --paper:#3A1B20; --panel:#2E1519; --ink:#DCCDB2; --ink-soft:#AB9486;
    --hair:#5E3A40; --hair-2:#4A2C32; --accent:#CDBA9A; --accent-d:#E0CFAE;
    background:radial-gradient(120% 80% at 50% 0%, #4B2329 0%, #3A1B20 55%, #281216 100%);
  }
  body.betrayed .submit { color:#2E1519; }
  body.betrayed .choice label:has(input:checked) { background:rgba(205,186,154,.14); color:var(--accent); box-shadow:inset 0 0 0 1px var(--accent); }
  body.betrayed input::placeholder, body.betrayed textarea::placeholder { color:#8C766B; }

  @media (max-width:560px) {
    .field { margin-bottom:2rem; }
    .field > .flabel { margin-bottom:.7rem; }
    input[type="text"],input[type="email"],select,textarea { padding:.75rem .1rem; font-size:1.12rem; }
    textarea { min-height:4em; }
    .choice { flex-direction:column; gap:.7rem; }
    .choice label { min-width:0; padding:1.05rem 1rem; font-size:1.22rem; }
    .submit { width:100%; padding:1.15rem 1rem; }
  }

  @media (max-width:460px) {
    .details { grid-template-columns:1fr; gap:1.6rem; }
    .sched-grid { grid-template-columns:1fr; gap:1.4rem; }
    .sched-item + .sched-item::before { display:none; }
  }
  @media (prefers-reduced-motion:reduce) {
    .reveal { opacity:1 !important; transform:none !important; transition:none !important; }
    .in .seal { animation:none; }
    #conditional { transition:none !important; }
  }

  /* Kumove / Witnesses block */
  .kumove { margin:clamp(1.6rem,4.5vw,2.4rem) auto 0; text-align:center; }
  .kumove #kumoveNames { font-family:var(--display); font-size:clamp(1.15rem,4vw,1.35rem); margin:0; color:var(--accent); }

  /* Bump small utility text on phones — the labels felt tiny on <400px screens */
  @media (max-width:480px) {
    body                 { font-size:17px; }
    .eyebrow             { font-size:.82rem; letter-spacing:.34em; }
    .st-title            { font-size:.78rem; letter-spacing:.22em; }
    .st-sub              { font-size:1rem; }
    .label               { font-size:.78rem; letter-spacing:.28em; }
    .venue .vc-label     { font-size:.74rem; letter-spacing:.24em; }
    .venue .vc-addr      { font-size:.86rem; letter-spacing:.08em; }
    .footer              { font-size:.76rem; letter-spacing:.28em; }
    .field > .flabel     { font-size:.78rem; letter-spacing:.22em; }
    .d-line              { font-size:1.22rem; }
    .d-sub               { font-size:1.04rem; }
    .attire              { font-size:1.02rem; }
    .photo-cap           { font-size:1.1rem; }
    .request             { font-size:1.1rem; }
  }
</style>
</head>

<body>
  <main class="card" id="card">
    <div class="inner">

      <div class="seal reveal d1" aria-hidden="true"><span id="monogram"></span></div>
      <p class="eyebrow reveal d2" id="eyebrow"></p>

      <h1 class="names reveal d2">
        <span class="name" id="partnerA"></span>
        <span class="amp">&amp;</span>
        <span class="name" id="partnerB"></span>
      </h1>

      <p class="request reveal d3" id="request"></p>

      <div class="photo-wrap reveal d3">
        <div class="photo" id="photo">
          <div class="ph" id="photoPlaceholder"><span class="glyph">&#10084;</span><span class="pht" id="photoHint"></span></div>
        </div>
        <p class="photo-cap" id="photoCap"></p>
      </div>

      <p class="datebig reveal d3" id="dateBig"></p>

      <div class="rule reveal d3"><span class="mark" aria-hidden="true">&#9670;</span></div>

      <div class="venue reveal d4">
        <figure>
          <div class="img"><img id="venueImg" alt="" /></div>
          <figcaption>
            <span class="vc-label" id="venueCapLabel"></span>
            <p class="vc-name" id="venueCapName"></p>
            <a class="vc-addr" id="venueCapAddr" target="_blank" rel="noopener"></a>
          </figcaption>
        </figure>
      </div>

      <div class="kumove reveal d4">
        <p class="label" style="margin-bottom:1rem;"></p>
        <p id="kumoveNames" style="font-family:var(--display);font-size:1.35rem;margin:0;color:var(--accent);">Witnesses: Hristo &amp; Simona Dikov</p>
      </div>  
      <section class="schedule reveal d5">
        <h2 class="sched-heading" id="schedHeading"></h2>
        <div class="sched-grid" id="schedGrid"></div>
      </section>

      <div class="rule reveal d5"><span class="mark" aria-hidden="true">&#9670;</span></div>

      <section class="rsvp reveal d6" id="rsvp">


        <form id="form" novalidate>
          <div class="field">
            <label class="flabel" id="lName" for="name"></label>
            <input type="text" id="name" name="name" autocomplete="name" enterkeyhint="next" required />
          </div>
          <div class="field">
            <span class="flabel" id="lAttend"></span>
            <div class="choice">
              <label><input type="radio" name="attending" value="accept" /><span id="optAccept"></span></label>
              <label><input type="radio" name="attending" value="decline" /><span id="optDecline"></span></label>
            </div>
          </div>

          <div class="betrayal" id="betrayal" hidden>
            <img id="betrayalImg" alt="" />
            <p class="betrayal-joke" id="betrayalJoke"></p>
          </div>

          <div id="conditional" hidden>
            <div class="field">
              <label class="flabel" id="lParty" for="guests"></label>
              <select id="guests" name="guests"></select>
            </div>
            <div id="guestNames"></div>
            <div class="field" id="guestListWrap" hidden>
              <label class="flabel" id="lGuestList" for="guestList"></label>
              <textarea id="guestList" name="guest_list"></textarea>
            </div>
            <!-- <div class="field">
              <label class="flabel" id="lDiet" for="diet"></label>
              <select id="diet" name="dietary"></select>
            </div> -->
            <div class="field" id="dietOtherWrap" style="display:none;">
              <label class="flabel" id="lDietOther" for="dietOther"></label>
              <input type="text" id="dietOther" name="dietary_other" />
            </div>
            <div id="mealSelections"></div>
            <div class="field">
              <label class="flabel" id="lSong" for="song"></label>
              <input type="text" id="song" name="song_request" />
            </div>
            <div class="field">
              <label class="flabel" id="lMsg" for="message"></label>
              <textarea id="message" name="message"></textarea>
            </div>
          </div>

          <div class="submit-wrap" id="submitWrap" hidden>
            <button type="submit" class="submit" id="submit"></button>
          </div>
          <p class="err" id="error" role="alert"></p>
        </form>

        <div class="thanks" id="thanks" hidden>
          <h2 id="thanksTitle"></h2>
          <p id="thanksMsg"></p>
        </div>
      </section>

    </div>
  </main>

    if (guests.value === "3plus") {
      const t = $("guestList").value.trim().replace(/\s*\n\s*/g, "; ");
      return t || "\u2014";
    }
    const names = [];
    guestNames.querySelectorAll("input").forEach(i => { if (i.value.trim()) names.push(i.value.trim()); });
    return names.length ? names.join("; ") : "\u2014";
  }
function dietValue() {
  const n = parseInt(guestsSel.value) || 0;
  const mealsSelected = [];

  if (guestsSel.value === '3plus') {
    return "3+ guests";
  }

  for (let i = 1; i <= n; i++) {
    const sel = document.querySelector(`select[name="meal_${i}"]`);
    if (sel) mealsSelected.push(sel.value);
  }

  return mealsSelected;
}

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    showError("");
    const name = form.name.value.trim();
    const choice = form.querySelector('input[name="attending"]:checked')?.value;

    if (!name) return showError(L.errName);
    if (!choice) return showError(L.errAttend);

    const accepting = choice === "accept";
    const key = (WEB3FORMS_ACCESS_KEY || "").trim();
    const data = {
      access_key: key,
      subject: L.mailSubject + " \u2014 " + name,
      name,
      attending: accepting ? L.optAccept : L.optDecline,
      party_size: accepting ? guests.value : "\u2014",
      additional_guests: accepting ? collectGuests() : "\u2014",
      dietary: accepting ? dietValue() : "\u2014",
      song_request: accepting ? (form.song_request.value.trim() || "\u2014") : "\u2014",
      message: accepting ? (form.message.value.trim() || "\u2014") : "\u2014"
    };

    const keyMissing = !key || key === "YOUR_ACCESS_KEY_HERE";
    if (keyMissing) return mailtoFallback(data, accepting);

    btn.disabled = true; btn.textContent = L.sending;
    try {
      const res = await fetch("https://api.web3forms.com/submit", {
        method:"POST", headers:{ "Content-Type":"application/json", "Accept":"application/json" },
        body: JSON.stringify(data)
      });
      const out = await res.json();
      if (out.success) showThanks(accepting, false);
      else { console.error("Web3Forms error:", out.message || out); mailtoFallback(data, accepting); }
    } catch (err) {
      console.error("Web3Forms request failed:", err);
      mailtoFallback(data, accepting);
    } finally {
      btn.disabled = false; btn.textContent = L.submit;
    }
  });

  /* ---- entrance ---- */
  requestAnimationFrame(() => document.body.classList.add("in"));

const guestsSel=document.getElementById('guests'),mealDiv=document.getElementById('mealSelections');
const meals=L.lang==='bg'?['Пиле','Свинско','Вегетарианско']:['Chicken','Pork','Vegetarian'];
function renderMeals(){
  if(!guestsSel||!mealDiv)return;
  mealDiv.innerHTML='';
  let n=parseInt(guestsSel.value)||0;
  if(guestsSel.value==='3plus'){
    n=-1;
  }
  for(let i=1;i<=n;i++){
    const w=document.createElement('div');
    w.className='field';
    const l=document.createElement('label');
    l.className='flabel';
    l.textContent=(L.lang==='bg'?'Избор на меню за гост ':'Meal for Guest ')+i;
    const s=document.createElement('select');
    s.name='meal_'+i;
    for(const m of meals){
      const o=document.createElement('option');
      o.value=m;o.textContent=m;
      s.appendChild(o)
    }
    w.append(l,s);
    mealDiv.appendChild(w)
  }
  if(n==-1){
    const w=document.createElement('div');
    w.className='field';
    const l=document.createElement('label');
    l.className='flabel';
    l.innerHTML ='<b>Meals</b>: Chicken, Pork, Vegetarian';
    l.style.fontStyle = 'italic';
    w.appendChild(l);
    mealDiv.appendChild(w);
    }
}
guestsSel&&guestsSel.addEventListener('change',renderMeals);
setTimeout(renderMeals,300);
</script>
